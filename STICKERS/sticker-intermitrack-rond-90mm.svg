<?xml version="1.0" encoding="UTF-8"?>
<!--
  INTERMITRACK — Sticker rond, prêt pour l'impression
  ---------------------------------------------------
  Format fichier ... 96 x 96 mm  (= 90 mm de sticker + 3 mm de fond perdu tout autour)
  Découpe ......... cercle Ø 90 mm, centré (repère "CUT" en pointillés, sur un calque à supprimer)
  Zone de sécurité . Ø 80 mm — rien d'important au-delà
  Couleurs ........ Pétrole #1F4E5F · Orange #F97316 · Blanc #FFFFFF
  QR .............. pointe vers https://intermitrack.fr/app.html (choix App Store / Google Play)
                    34 mm => module 0,83 mm, correction H (résiste aux rayures)
  Polices ......... Helvetica / Arial (présentes partout). Les textes ne sont PAS vectorisés.
                    ==> AVANT d'envoyer chez un fabricant : soit tu exportes en PDF depuis le
                        navigateur (les polices sont alors incorporées au PDF), soit tu ouvres
                        ce SVG dans Inkscape (gratuit) et tu fais Chemin > Objet en chemin,
                        ce qui transforme les lettres en formes. Sinon, risque que l'imprimeur
                        remplace la police et décale la couronne.
-->
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="96mm" height="96mm" viewBox="0 0 96 96">
  <defs>
    <!-- Le fond ne déborde jamais du fond perdu -->
    <clipPath id="bleed"><circle cx="48" cy="48" r="48"/></clipPath>

    <!-- Halo du projecteur (orange, depuis le haut) -->
    <radialGradient id="halo" cx="48" cy="17.4" r="46" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#F97316" stop-opacity="0.90"/>
      <stop offset="0.42" stop-color="#F97316" stop-opacity="0.20"/>
      <stop offset="0.68" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>

    <!-- Faisceau de poursuite, adouci -->
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>

    <!-- Couronne : cercle support du texte (r = 38.25 mm) -->
    <path id="crown" d="M 48,9.75 a 38.25,38.25 0 1,1 -0.01,0" fill="none"/>
  </defs>

  <g clip-path="url(#bleed)">
    <!-- Fond pétrole (jusqu'au fond perdu) -->
    <circle cx="48" cy="48" r="48" fill="#1F4E5F"/>
    <!-- Faisceau -->
    <polygon points="29,0 67,0 48,40" fill="#F97316" fill-opacity="0.17" filter="url(#soft)"/>
    <!-- Halo -->
    <circle cx="48" cy="48" r="48" fill="url(#halo)"/>
  </g>

  <!-- Couronne d'onglets -->
  <text font-family="Helvetica, Arial, sans-serif" font-size="2.79" font-weight="900"
        letter-spacing="0.11" fill="#FFFFFF">
    <textPath href="#crown" xlink:href="#crown" startOffset="0" textLength="238" lengthAdjust="spacing">TABLEAU DE BORD · MISSIONS · CALENDRIER · ACTUALISATION · DOCUMENTS · PRÉVISIONS · AUTO-ENTREPRENEUR · FISCALITÉ · CONTACTS · </textPath>
  </text>

  <!-- INTERMITRACK -->
  <text x="48" y="29.6" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="4.4" font-weight="900" letter-spacing="-0.09" fill="#FFFFFF">INTERMITRACK</text>

  <!-- Pastille blanche + QR (obligatoire : un QR ne scanne pas sur fond coloré) -->
  <rect x="29.5" y="31.5" width="37" height="37" rx="2.6" fill="#FFFFFF"/>
  <g transform="translate(31, 33) scale(0.82927)">
    <path fill="#ffffff" d="M0 0h41v41H0z"/>
    <path stroke="#000000" d="M4 4.5h7m1 0h2m4 0h2m1 0h3m1 0h4m1 0h7M4 5.5h1m5 0h1m2 0h3m1 0h2m1 0h1m4 0h1m1 0h1m2 0h1m5 0h1M4 6.5h1m1 0h3m1 0h1m2 0h2m1 0h4m1 0h1m2 0h1m2 0h2m1 0h1m1 0h3m1 0h1M4 7.5h1m1 0h3m1 0h1m1 0h1m2 0h1m2 0h2m1 0h1m2 0h1m1 0h1m3 0h1m1 0h3m1 0h1M4 8.5h1m1 0h3m1 0h1m2 0h1m5 0h1m5 0h1m2 0h1m1 0h1m1 0h3m1 0h1M4 9.5h1m5 0h1m8 0h2m1 0h2m2 0h2m2 0h1m5 0h1M4 10.5h7m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h1m1 0h7M13 11.5h3m2 0h2m1 0h2m2 0h4M6 12.5h1m1 0h3m1 0h1m1 0h1m1 0h4m1 0h1m3 0h1m1 0h3m3 0h1m2 0h1M5 13.5h1m2 0h2m2 0h2m4 0h1m2 0h2m7 0h1m2 0h1m1 0h2M4 14.5h3m1 0h1m1 0h2m2 0h1m2 0h1m1 0h4m1 0h2m2 0h3m1 0h5M6 15.5h4m1 0h1m8 0h1m1 0h1m1 0h1M6 16.5h5m1 0h2m1 0h3m1 0h4m5 0h4M5 17.5h1m2 0h2m1 0h1m3 0h1m1 0h1m4 0h1m1 0h1m3 0h1m1 0h1m2 0h1m1 0h2M6 18.5h2m2 0h1m1 0h5m3 0h1m2 0h3m3 0h1m2 0h1m1 0h3M4 19.5h1m1 0h1m2 0h1m2 0h1m1 0h2m2 0h2m1 0h1m1 0h11m1 0h1M6 20.5h3m1 0h6m3 0h2m2 0h1m1 0h3m1 0h2m5 0h1M4 21.5h1m1 0h1m2 0h1m2 0h1m1 0h1m1 0h2m1 0h1m1 0h3m1 0h1m3 0h3m1 0h2m1 0h1M4 22.5h2m4 0h5m1 0h4m1 0h1m2 0h1m4 0h3m2 0h3M5 23.5h2m5 0h4m2 0h1m3 0h1m2 0h1m3 0h1m1 0h2m2 0h1M7 24.5h4m2 0h2m1 0h2m1 0h1m2 0h1m1 0h2m2 0h3m2 0h1m2 0h1M6 25.5h1m1 0h1m3 0h1m1 0h1m2 0h1m1 0h2m1 0h2m1 0h2m1 0h3m3 0h3M4 26.5h1m4 0h2m1 0h1m2 0h4m1 0h1m1 0h3m1 0h1m3 0h1m1 0h1m2 0h2M5 27.5h2m4 0h3m3 0h1m1 0h1m1 0h2m2 0h5m5 0h2M4 28.5h1m1 0h1m1 0h5m2 0h1m1 0h1m2 0h1m2 0h3m1 0h7m2 0h1M12 29.5h1m2 0h1m3 0h1m2 0h5m1 0h1m3 0h2m1 0h2M4 30.5h7m2 0h1m1 0h4m1 0h1m1 0h1m3 0h3m1 0h1m1 0h2m1 0h2M4 31.5h1m5 0h1m1 0h1m2 0h1m3 0h2m2 0h1m1 0h2m1 0h1m3 0h1m3 0h1M4 32.5h1m1 0h3m1 0h1m1 0h2m1 0h4m1 0h1m2 0h2m1 0h1m1 0h5m2 0h1M4 33.5h1m1 0h3m1 0h1m3 0h2m1 0h2m3 0h1m1 0h5m3 0h1m1 0h3M4 34.5h1m1 0h3m1 0h1m1 0h1m2 0h1m1 0h1m2 0h1m6 0h3m1 0h2m3 0h1M4 35.5h1m5 0h1m4 0h1m1 0h1m2 0h1m1 0h1m2 0h5m1 0h1m3 0h1M4 36.5h7m4 0h1m1 0h3m1 0h1m1 0h2m1 0h3m2 0h2m2 0h2"/>
  </g>

  <!-- Baseline -->
  <text x="48" y="72.4" text-anchor="middle" font-family="Helvetica, Arial, sans-serif"
        font-size="2.8" font-weight="800" letter-spacing="0.17" fill="#FDBA74">TOUTE TON INTERMITTENCE</text>

  <!-- ===== REPÈRES — à SUPPRIMER avant d'envoyer à l'imprimeur ===== -->
  <g id="reperes-a-supprimer" opacity="0.9">
    <circle cx="48" cy="48" r="45" fill="none" stroke="#00E5FF" stroke-width="0.2" stroke-dasharray="1.2 1.2"/>
    <circle cx="48" cy="48" r="40" fill="none" stroke="#00E5FF" stroke-width="0.15" stroke-dasharray="0.6 1.2" opacity="0.6"/>
  </g>
</svg>
