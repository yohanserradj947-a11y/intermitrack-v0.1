<!doctype html>
<!-- Dashboard admin d'Intermitrack. Page EN LIGNE mais PROTÉGÉE : les chiffres ne s'affichent qu'après
     connexion avec le compte admin, et la fonction get_admin_dashboard() n'accepte QUE l'email admin.
     Le mot de passe n'est demandé qu'UNE fois (session mémorisée en local). -->
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Dashboard — Intermitrack</title>
<style>
  *{margin:0;box-sizing:border-box;}
  body{min-height:100vh;background:#0b1e26;color:#fff;font-family:'Segoe UI',system-ui,Arial,sans-serif;padding:26px;}
  h1{font-size:20px;font-weight:900;margin-bottom:2px;}
  .muted{color:#A9BBBA;font-size:13px;}
  .login{max-width:340px;margin:12vh auto;display:flex;flex-direction:column;gap:10px;}
  .login input{padding:12px 14px;border-radius:10px;border:1px solid #24424e;background:#0f2731;color:#fff;font-size:15px;}
  .login button,.reload,.logout{padding:11px 14px;border:none;border-radius:10px;background:#1F7A8C;color:#fff;font-weight:800;font-size:14px;cursor:pointer;}
  .logout{background:transparent;color:#A9BBBA;text-decoration:underline;padding:6px;}
  .err{color:#FF8A8A;font-size:13px;min-height:16px;}
  .wrap{max-width:1000px;margin:0 auto;}
  .top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:18px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .card{background:#0f2731;border:1px solid #1c3742;border-radius:14px;padding:16px;}
  .card .v{font-size:30px;font-weight:900;line-height:1.1;}
  .card .l{font-size:12px;color:#A9BBBA;text-transform:uppercase;letter-spacing:.04em;margin-top:4px;}
  .card .s{font-size:12px;color:#7FE0C2;font-weight:700;margin-top:3px;}
  .card.hl{border-color:#2a6b52;background:#0e2b24;}
  .sec{margin-top:22px;}
  .sec h2{font-size:14px;text-transform:uppercase;letter-spacing:.05em;color:#A9BBBA;margin-bottom:10px;}
  .bars{display:flex;align-items:flex-end;gap:3px;height:110px;background:#0f2731;border:1px solid #1c3742;border-radius:12px;padding:12px;}
  .bar{flex:1;background:#1F7A8C;border-radius:3px 3px 0 0;min-height:2px;}
  .rows{background:#0f2731;border:1px solid #1c3742;border-radius:12px;overflow:hidden;}
  .rw{display:flex;justify-content:space-between;padding:10px 14px;border-top:1px solid #16303a;font-size:14px;}
  .rw:first-child{border-top:none;}
  .rw b{font-weight:800;}
</style>
</head>
<body>
  <div class="login" id="login" style="display:none;">
    <h1>Dashboard</h1>
    <div class="muted" style="margin-bottom:6px;">Connexion (une seule fois, ensuite c'est mémorisé).</div>
    <input id="email" type="email" placeholder="Email" value="yohanserradj947@gmail.com" />
    <input id="pass" type="password" placeholder="Mot de passe" />
    <button id="go">Voir mes stats</button>
    <div class="err" id="err"></div>
  </div>

  <div class="wrap" id="board" style="display:none;">
    <div class="top">
      <div><h1>Dashboard Intermitrack</h1><div class="muted" id="asof"></div></div>
      <div style="display:flex;gap:8px;align-items:center;"><button class="reload" id="reload">Rafraîchir</button><button class="logout" id="logout">Déconnexion</button></div>
    </div>
    <div class="grid" id="cards"></div>
    <div class="sec"><h2>Inscriptions (30 derniers jours)</h2><div class="bars" id="chart"></div></div>
    <div class="sec"><h2>Écrans les plus vus</h2><div class="rows" id="views"></div></div>
  </div>

<script>
(function(){
  var SB = "https://upeogpgczoghlfwblnkb.supabase.co";
  var KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVwZW9ncGdjem9naGxmd2JsbmtiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MjkyMDQsImV4cCI6MjA5NjEwNTIwNH0.6535_0KMaEDLxTMhz_OX-4OqC_tpQsPJR5jkFQL7UqI";
  var RT = "itk_admin_rt";
  var token = null;
  function $(id){ return document.getElementById(id); }
  function fmt(n){ return (n==null?"–":String(n)).replace(/\B(?=(\d{3})+(?!\d))/g," "); }

  $("go").addEventListener("click", login);
  $("pass").addEventListener("keydown", function(e){ if(e.key==="Enter") login(); });
  $("reload").addEventListener("click", load);
  $("logout").addEventListener("click", function(){ localStorage.removeItem(RT); location.reload(); });

  function showLogin(){ $("login").style.display="flex"; $("board").style.display="none"; }
  function showBoard(){ $("login").style.display="none"; $("board").style.display=""; }

  function login(){
    $("err").textContent = "";
    fetch(SB + "/auth/v1/token?grant_type=password", {
      method:"POST", headers:{ "apikey":KEY, "Content-Type":"application/json" },
      body: JSON.stringify({ email:$("email").value.trim(), password:$("pass").value })
    }).then(function(r){ return r.json(); }).then(function(d){
      if(!d.access_token){ $("err").textContent = "Connexion refusée. Vérifie ton mot de passe."; return; }
      token = d.access_token;
      if(d.refresh_token) localStorage.setItem(RT, d.refresh_token);
      showBoard(); load();
    }).catch(function(){ $("err").textContent = "Erreur réseau."; });
  }

  function tryRefresh(){
    var rt = localStorage.getItem(RT);
    if(!rt){ showLogin(); return; }
    fetch(SB + "/auth/v1/token?grant_type=refresh_token", {
      method:"POST", headers:{ "apikey":KEY, "Content-Type":"application/json" },
      body: JSON.stringify({ refresh_token: rt })
    }).then(function(r){ return r.json(); }).then(function(d){
      if(d.access_token){ token=d.access_token; if(d.refresh_token) localStorage.setItem(RT, d.refresh_token); showBoard(); load(); }
      else { localStorage.removeItem(RT); showLogin(); }
    }).catch(function(){ showLogin(); });
  }

  function load(){
    fetch(SB + "/rest/v1/rpc/get_admin_dashboard", {
      method:"POST", headers:{ "apikey":KEY, "Authorization":"Bearer "+token, "Content-Type":"application/json" },
      body:"{}"
    }).then(function(r){ return r.json(); }).then(render).catch(function(){});
  }

  function card(v, l, s, hl){ return '<div class="card'+(hl?' hl':'')+'"><div class="v">'+v+'</div><div class="l">'+l+'</div>'+(s?'<div class="s">'+s+'</div>':'')+'</div>'; }

  function render(d){
    if(!d || d.code || d.message){ $("cards").innerHTML = '<div class="card"><div class="l">Erreur : '+(d && (d.message||d.code) || 'inconnue')+'</div></div>'; return; }
    $("asof").textContent = "Mis à jour : " + new Date().toLocaleString("fr-FR") + " · (ton compte exclu des chiffres)";
    $("cards").innerHTML =
      card(fmt(d.total_users), "Inscrits", "+"+fmt(d.new_today)+" aujourd'hui")
    + card(fmt(d.qr_total), "Scans du QR", "+"+fmt(d.qr_today)+" aujourd'hui", true)
    + card(fmt(d.dau), "Actifs / jour (DAU)")
    + card(fmt(d.wau), "Actifs / semaine (WAU)")
    + card(fmt(d.mau), "Actifs / mois (MAU)")
    + card(d.retention_7d+" %", "Rétention 7 j")
    + card(fmt(d.total_hours)+" h", "Heures dans l'appli", fmt(d.hours_per_user)+" h / user")
    + card(fmt(d.total_missions), "Missions créées", fmt(d.missions_per_user)+" / user")
    + card(fmt(d.new_7d), "Nouveaux (7 j)", "+"+fmt(d.new_30d)+" sur 30 j")
    + card(fmt(d.active_mobile_7d), "Actifs appli (7 j)")
    + card(fmt(d.active_web_7d), "Actifs site (7 j)");

    var sb = d.signups_by_day || [];
    var max = Math.max(1, Math.max.apply(null, sb.map(function(x){ return x.n; }).concat([1])));
    $("chart").innerHTML = sb.map(function(x){ return '<div class="bar" title="'+x.jour+' : '+x.n+'" style="height:'+Math.round(x.n/max*86)+'px;"></div>'; }).join("") || '<div class="muted">Aucune inscription récente.</div>';

    var tv = d.top_views || [];
    $("views").innerHTML = tv.map(function(x){ return '<div class="rw"><span>'+x.vue+'</span><b>'+fmt(x.n)+'</b></div>'; }).join("") || '<div class="rw muted">Pas encore de données.</div>';
  }

  tryRefresh();
})();
</script>
</body>
</html>
